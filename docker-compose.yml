# Attractor Stack - Single container deployment
# Usage: docker compose up

services:
  # Attractor Server
  attractor:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: attractor:latest
    container_name: attractor
    ports:
      - "${SERVER_PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - STATE_DIR=/app/data/state
      - ARTIFACTS_DIR=/app/data/artifacts
      - LOGS_DIR=/app/logs
      - CHECKPOINTS_DIR=/app/checkpoints
      - COORDINATOR_ENABLED=${COORDINATOR_ENABLED:-true}
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - KILO_API_KEY=${KILO_API_KEY:-}
      - KILO_CONFIG=${KILO_CONFIG:-balanced}
    volumes:
      - attractor_data:/app/data
      - attractor_logs:/app/logs
      - attractor_checkpoints:/app/checkpoints
      - ./workflows:/app/workflows:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Optional: Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: attractor_nginx
    ports:
      - "${NGINX_PORT:-80}:80"
      - "${NGINX_SSL_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - attractor
    restart: unless-stopped

# Named volumes for data persistence
volumes:
  attractor_data:
    driver: local
  attractor_logs:
    driver: local
  attractor_checkpoints:
    driver: local
