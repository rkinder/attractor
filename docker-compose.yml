# Attractor Stack - Single container deployment
# Usage: docker compose up

services:
  # Redis for distributed coordination
  redis:
    image: redis:7-alpine
    container_name: attractor_redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Attractor Server
  attractor:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: attractor:production
    container_name: attractor
    user: root
    ports:
      - "${SERVER_PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - STATE_DIR=/app/data/state
      - ARTIFACTS_DIR=/app/data/artifacts
      - LOGS_DIR=/app/logs
      - CHECKPOINTS_DIR=/app/checkpoints
      - COORDINATOR_ENABLED=${COORDINATOR_ENABLED:-true}
      - REDIS_ENABLED=true
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
      - LMSTUDIO_BASE_URL=${LMSTUDIO_BASE_URL:-http://host.docker.internal:1234/v1}
      - LMSTUDIO_MODEL=${LMSTUDIO_MODEL:-qwen/qwen3.5-9b}
      - LMSTUDIO_API_KEY=${LMSTUDIO_API_KEY:-lm-studio}
    volumes:
      - attractor_data:/app/data
      - attractor_logs:/app/logs
      - attractor_checkpoints:/app/checkpoints
      - ./workflows:/app/workflows:ro
      # Use named volume for generated code (avoids host permission issues)
      - attractor_generated:/app/generated
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    command: ["node", "src/server/index.js"]

  # # Optional: Nginx reverse proxy (disabled for now)
  # nginx:
  #   image: nginx:alpine
  #   container_name: attractor_nginx
  #   ports:
  #     - "${NGINX_PORT:-80}:80"
  #     - "${NGINX_SSL_PORT:-443}:443"
  #   volumes:
  #     - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
  #   depends_on:
  #     - attractor
  #   restart: unless-stopped

# Named volumes for data persistence
volumes:
  redis_data:
    driver: local
  attractor_data:
    driver: local
  attractor_logs:
    driver: local
  attractor_checkpoints:
    driver: local
  attractor_generated:
    driver: local
