# Distributed deployment with multiple Attractor instances
# Note: Requires shared filesystem (NFS, EFS, etc.) for multi-instance state
# Usage: docker-compose -f docker-compose.distributed.yml up

services:
  # Redis for distributed coordination
  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Attractor instances (scalable)
  attractor:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: attractor:latest
    deploy:
      replicas: 3
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
    environment:
      - NODE_ENV=production
      - STATE_DIR=/app/data/state
      - ARTIFACTS_DIR=/app/data/artifacts
      - LOGS_DIR=/app/logs
      - CHECKPOINTS_DIR=/app/checkpoints
      - COORDINATOR_ENABLED=true
      - REDIS_ENABLED=true
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CORS_ORIGIN=*
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./checkpoints:/app/checkpoints
      - ./workflows:/app/workflows:ro
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    entrypoint: ["/docker-entrypoint.sh"]

  # Nginx load balancer
  nginx:
    image: nginx:alpine
    ports:
      - "${SERVER_PORT:-3000}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - attractor

# Named volumes - use NFS/EFS driver for distributed deployments
volumes:
  redis_data:
    driver: local
