# Distributed deployment with multiple Attractor instances
# Note: Requires shared filesystem (NFS, EFS, etc.) for multi-instance state
# Usage: docker-compose -f docker-compose.distributed.yml up

services:
  # Attractor instances (scalable)
  attractor:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: attractor:latest
    deploy:
      replicas: 3
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
    environment:
      - NODE_ENV=production
      - STATE_DIR=/app/data/state
      - ARTIFACTS_DIR=/app/data/artifacts
      - LOGS_DIR=/app/logs
      - CHECKPOINTS_DIR=/app/checkpoints
      - COORDINATOR_ENABLED=true
      - CORS_ORIGIN=*
    volumes:
      - attractor_data:/app/data
      - attractor_logs:/app/logs
      - attractor_checkpoints:/app/checkpoints
      - ./workflows:/app/workflows:ro
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # Nginx load balancer
  nginx:
    image: nginx:alpine
    ports:
      - "${SERVER_PORT:-3000}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - attractor

# Named volumes - use NFS/EFS driver for distributed deployments
volumes:
  attractor_data:
    driver: local
  attractor_logs:
    driver: local
  attractor_checkpoints:
    driver: local
