# Attractor Nginx Configuration
# Load balancer with health checks and WebSocket support

events {
    worker_connections 1024;
}

http {
    # Upstream backend definition
    upstream attractor_backend {
        least_conn;  # Use least connections for load balancing
        
        # Backend servers (configure based on deployment)
        server attractor_1:3000 max_fails=3 fail_timeout=30s;
        server attractor_2:3000 max_fails=3 fail_timeout=30s;
        server attractor_3:3000 max_fails=3 fail_timeout=30s;
        
        keepalive 32;  # Keep connections alive
    }

    # Logging configuration
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'upstream_addr=$upstream_addr upstream_status=$upstream_status';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    # General settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml;

    # Main server
    server {
        listen 80;
        server_name localhost;

        # Health check endpoint (no authentication required)
        location /health {
            proxy_pass http://attractor_backend;
            proxy_http_version 1.1;
            proxy_connect_timeout 5s;
            proxy_read_timeout 5s;
            
            # Lightweight health check
            access_log off;
        }

        # Detailed health check for load balancer monitoring
        location /health/detailed {
            proxy_pass http://attractor_backend/health;
            proxy_http_version 1.1;
            
            # Add instance info to headers
            proxy_set_header X-Health-Check "detailed";
            
            access_log off;
        }

        # API endpoints
        location / {
            proxy_pass http://attractor_backend;
            proxy_http_version 1.1;
            
            # HTTP upgrade for WebSocket
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            # Preserve original headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Timeouts
            proxy_connect_timeout 30s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
            
            # Buffering
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
        }

        # WebSocket endpoint
        location /pipelines/ {
            proxy_pass http://attractor_backend;
            proxy_http_version 1.1;
            
            # WebSocket support
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            # Headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            # Longer timeouts for WebSocket
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # Redirect root to health
        location = / {
            return 302 /health;
        }

        # Deny access to hidden files
        location ~ /\. {
            deny all;
        }
    }
}
