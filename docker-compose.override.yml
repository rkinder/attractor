# Override file for local development
# Usage: docker-compose up

services:
  # Override attractor for development
  attractor:
    build:
      target: development
    image: attractor:dev
    environment:
      - NODE_ENV=development
      - STATE_DIR=./data/state
    volumes:
      # Watch source files for changes
      - ./src:/app/src
      - ./examples:/app/examples
      # Mount workflows for development
      - ./workflows:/app/workflows
      # Mount data directories
      - ./data:/app/data
      - ./logs:/app/logs
      - ./checkpoints:/app/checkpoints
    command: node src/server/index.js
    ports:
      - "3000:3000"
      - "9229:9229"  # Node inspector

  # Disable nginx in development
  nginx:
    profiles:
      - production
    deploy:
      replicas: 0
